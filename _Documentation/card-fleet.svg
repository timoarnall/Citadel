<svg xmlns="http://www.w3.org/2000/svg" width="280" height="400" viewBox="0 0 280 400">
  <defs>
    <linearGradient id="fleet-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a3a5c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="fleet-accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:1" />
    </linearGradient>
    <filter id="fleet-glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Card body -->
  <rect width="280" height="400" rx="16" fill="url(#fleet-bg)" stroke="#f59e0b" stroke-width="1.5" stroke-opacity="0.4"/>

  <!-- Top accent line -->
  <rect x="20" y="12" width="240" height="3" rx="1.5" fill="url(#fleet-accent)" opacity="0.8"/>

  <!-- Character icon: constellation / network -->
  <g transform="translate(140,100)" filter="url(#fleet-glow)">
    <circle r="50" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.3"/>
    <circle r="38" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.15"/>
    <!-- Central node -->
    <circle r="6" fill="#f59e0b" opacity="0.9"/>
    <!-- Satellite nodes -->
    <circle cx="-22" cy="-18" r="4" fill="#ef4444" opacity="0.8"/>
    <circle cx="22" cy="-18" r="4" fill="#ef4444" opacity="0.8"/>
    <circle cx="-26" cy="12" r="4" fill="#f59e0b" opacity="0.7"/>
    <circle cx="26" cy="12" r="4" fill="#f59e0b" opacity="0.7"/>
    <circle cx="0" cy="26" r="4" fill="#ef4444" opacity="0.6"/>
    <!-- Connection lines -->
    <line x1="0" y1="0" x2="-22" y2="-18" stroke="#f59e0b" stroke-width="1.5" opacity="0.5"/>
    <line x1="0" y1="0" x2="22" y2="-18" stroke="#f59e0b" stroke-width="1.5" opacity="0.5"/>
    <line x1="0" y1="0" x2="-26" y2="12" stroke="#f59e0b" stroke-width="1.5" opacity="0.4"/>
    <line x1="0" y1="0" x2="26" y2="12" stroke="#f59e0b" stroke-width="1.5" opacity="0.4"/>
    <line x1="0" y1="0" x2="0" y2="26" stroke="#f59e0b" stroke-width="1.5" opacity="0.3"/>
    <!-- Cross connections (discovery relay) -->
    <line x1="-22" y1="-18" x2="22" y2="-18" stroke="#ef4444" stroke-width="0.8" opacity="0.3" stroke-dasharray="3,3"/>
    <line x1="-26" y1="12" x2="26" y2="12" stroke="#ef4444" stroke-width="0.8" opacity="0.3" stroke-dasharray="3,3"/>
    <!-- Outer orbit dots -->
    <circle cx="-34" cy="-30" r="1.5" fill="#f59e0b" opacity="0.4"/>
    <circle cx="34" cy="-30" r="1.5" fill="#f59e0b" opacity="0.4"/>
    <circle cx="36" cy="24" r="1.5" fill="#f59e0b" opacity="0.3"/>
  </g>

  <!-- Name -->
  <text x="140" y="185" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="28" font-weight="700" fill="#ffffff" letter-spacing="4">FLEET</text>

  <!-- Role -->
  <text x="140" y="210" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="13" fill="#f59e0b" opacity="0.9" letter-spacing="1">PARALLEL COORDINATOR</text>

  <!-- Divider -->
  <line x1="40" y1="228" x2="240" y2="228" stroke="#f59e0b" stroke-width="0.5" opacity="0.3"/>

  <!-- Stats -->
  <g font-family="'Segoe UI',system-ui,sans-serif" font-size="12">
    <text x="40" y="256" fill="#8892b0">Agents</text>
    <text x="240" y="256" text-anchor="end" fill="#f59e0b">2–3 per wave</text>

    <text x="40" y="282" fill="#8892b0">Isolation</text>
    <text x="240" y="282" text-anchor="end" fill="#ccd6f6">Worktree-scoped</text>

    <text x="40" y="308" fill="#8892b0">Discovery</text>
    <text x="240" y="308" text-anchor="end" fill="#ccd6f6">Wave relay</text>

    <text x="40" y="334" fill="#8892b0">Scale</text>
    <text x="240" y="334" text-anchor="end" fill="#f59e0b">Institutional</text>
  </g>

  <!-- Bottom description -->
  <text x="140" y="372" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#8892b0" opacity="0.7">
    <tspan x="140" dy="0">Parallel agents sharing discoveries</tspan>
    <tspan x="140" dy="14">between coordinated waves.</tspan>
  </text>
</svg>
