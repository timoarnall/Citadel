<svg xmlns="http://www.w3.org/2000/svg" width="280" height="400" viewBox="0 0 280 400">
  <defs>
    <linearGradient id="marshal-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f3460;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="marshal-accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f39c12;stop-opacity:1" />
    </linearGradient>
    <filter id="marshal-glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Card body -->
  <rect width="280" height="400" rx="16" fill="url(#marshal-bg)" stroke="#e94560" stroke-width="1.5" stroke-opacity="0.4"/>

  <!-- Top accent line -->
  <rect x="20" y="12" width="240" height="3" rx="1.5" fill="url(#marshal-accent)" opacity="0.8"/>

  <!-- Character icon: command baton / chain links -->
  <g transform="translate(140,100)" filter="url(#marshal-glow)">
    <circle r="50" fill="none" stroke="#e94560" stroke-width="1" opacity="0.3"/>
    <circle r="38" fill="none" stroke="#e94560" stroke-width="1" opacity="0.15"/>
    <!-- Chain links -->
    <ellipse cx="-12" cy="-15" rx="12" ry="8" fill="none" stroke="#e94560" stroke-width="2"/>
    <ellipse cx="12" cy="-15" rx="12" ry="8" fill="none" stroke="#f39c12" stroke-width="2"/>
    <ellipse cx="0" cy="5" rx="12" ry="8" fill="none" stroke="#e94560" stroke-width="2"/>
    <ellipse cx="-12" cy="20" rx="12" ry="8" fill="none" stroke="#f39c12" stroke-width="2" opacity="0.7"/>
    <ellipse cx="12" cy="20" rx="12" ry="8" fill="none" stroke="#e94560" stroke-width="2" opacity="0.7"/>
    <!-- Spark -->
    <circle cx="26" cy="-30" r="2" fill="#f39c12" opacity="0.8"/>
    <circle cx="-26" cy="32" r="1.5" fill="#e94560" opacity="0.6"/>
  </g>

  <!-- Name -->
  <text x="140" y="185" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="26" font-weight="700" fill="#ffffff" letter-spacing="3">MARSHAL</text>

  <!-- Role -->
  <text x="140" y="210" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="13" fill="#e94560" opacity="0.9" letter-spacing="1">SESSION COMMANDER</text>

  <!-- Divider -->
  <line x1="40" y1="228" x2="240" y2="228" stroke="#e94560" stroke-width="0.5" opacity="0.3"/>

  <!-- Stats -->
  <g font-family="'Segoe UI',system-ui,sans-serif" font-size="12">
    <text x="40" y="256" fill="#8892b0">Scope</text>
    <text x="240" y="256" text-anchor="end" fill="#ccd6f6">Single session</text>

    <text x="40" y="282" fill="#8892b0">Duration</text>
    <text x="240" y="282" text-anchor="end" fill="#ccd6f6">30min – 2hr</text>

    <text x="40" y="308" fill="#8892b0">Skill loading</text>
    <text x="240" y="308" text-anchor="end" fill="#f39c12">On-demand chaining</text>

    <text x="40" y="334" fill="#8892b0">Quality gates</text>
    <text x="240" y="334" text-anchor="end" fill="#ccd6f6">Enforced</text>
  </g>

  <!-- Bottom description -->
  <text x="140" y="372" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#8892b0" opacity="0.7">
    <tspan x="140" dy="0">Chains skills into multi-step</tspan>
    <tspan x="140" dy="14">investigations and builds.</tspan>
  </text>
</svg>
