<svg xmlns="http://www.w3.org/2000/svg" width="280" height="400" viewBox="0 0 280 400">
  <defs>
    <linearGradient id="skill-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="skill-accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d2ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3a7bd5;stop-opacity:1" />
    </linearGradient>
    <filter id="skill-glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Card body -->
  <rect width="280" height="400" rx="16" fill="url(#skill-bg)" stroke="#00d2ff" stroke-width="1.5" stroke-opacity="0.4"/>

  <!-- Top accent line -->
  <rect x="20" y="12" width="240" height="3" rx="1.5" fill="url(#skill-accent)" opacity="0.8"/>

  <!-- Character icon: scroll/book -->
  <g transform="translate(140,100)" filter="url(#skill-glow)">
    <circle r="50" fill="none" stroke="#00d2ff" stroke-width="1" opacity="0.3"/>
    <circle r="38" fill="none" stroke="#00d2ff" stroke-width="1" opacity="0.15"/>
    <!-- Book shape -->
    <rect x="-24" y="-30" width="48" height="60" rx="3" fill="none" stroke="#00d2ff" stroke-width="2"/>
    <line x1="0" y1="-30" x2="0" y2="30" stroke="#00d2ff" stroke-width="1.5"/>
    <line x1="-16" y1="-18" x2="-6" y2="-18" stroke="#00d2ff" stroke-width="1.5" opacity="0.6"/>
    <line x1="-16" y1="-10" x2="-6" y2="-10" stroke="#00d2ff" stroke-width="1.5" opacity="0.6"/>
    <line x1="-16" y1="-2" x2="-6" y2="-2" stroke="#00d2ff" stroke-width="1.5" opacity="0.6"/>
    <line x1="6" y1="-18" x2="16" y2="-18" stroke="#00d2ff" stroke-width="1.5" opacity="0.6"/>
    <line x1="6" y1="-10" x2="16" y2="-10" stroke="#00d2ff" stroke-width="1.5" opacity="0.6"/>
    <line x1="6" y1="-2" x2="16" y2="-2" stroke="#00d2ff" stroke-width="1.5" opacity="0.6"/>
    <!-- Sparkle -->
    <circle cx="20" cy="-35" r="2" fill="#00d2ff" opacity="0.8"/>
    <circle cx="28" cy="-28" r="1.2" fill="#00d2ff" opacity="0.5"/>
  </g>

  <!-- Name -->
  <text x="140" y="185" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="28" font-weight="700" fill="#ffffff" letter-spacing="3">SKILL</text>

  <!-- Role -->
  <text x="140" y="210" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="13" fill="#00d2ff" opacity="0.9" letter-spacing="1">DOMAIN EXPERT</text>

  <!-- Divider -->
  <line x1="40" y1="228" x2="240" y2="228" stroke="#00d2ff" stroke-width="0.5" opacity="0.3"/>

  <!-- Stats -->
  <g font-family="'Segoe UI',system-ui,sans-serif" font-size="12">
    <text x="40" y="256" fill="#8892b0">Format</text>
    <text x="240" y="256" text-anchor="end" fill="#ccd6f6">Markdown protocol</text>

    <text x="40" y="282" fill="#8892b0">Loading</text>
    <text x="240" y="282" text-anchor="end" fill="#ccd6f6">On-demand</text>

    <text x="40" y="308" fill="#8892b0">Tokens (inactive)</text>
    <text x="240" y="308" text-anchor="end" fill="#00d2ff">Zero</text>

    <text x="40" y="334" fill="#8892b0">Portability</text>
    <text x="240" y="334" text-anchor="end" fill="#ccd6f6">Any project</text>
  </g>

  <!-- Bottom description -->
  <text x="140" y="372" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#8892b0" opacity="0.7">
    <tspan x="140" dy="0">Focused protocols that load expertise</tspan>
    <tspan x="140" dy="14">on demand. Zero cost when idle.</tspan>
  </text>
</svg>
