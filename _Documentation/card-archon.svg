<svg xmlns="http://www.w3.org/2000/svg" width="280" height="400" viewBox="0 0 280 400">
  <defs>
    <linearGradient id="archon-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d1b69;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="archon-accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
    <filter id="archon-glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Card body -->
  <rect width="280" height="400" rx="16" fill="url(#archon-bg)" stroke="#a855f7" stroke-width="1.5" stroke-opacity="0.5"/>

  <!-- Top accent line -->
  <rect x="20" y="12" width="240" height="3" rx="1.5" fill="url(#archon-accent)" opacity="0.9"/>

  <!-- Character icon: eye of providence / all-seeing -->
  <g transform="translate(140,100)" filter="url(#archon-glow)">
    <circle r="50" fill="none" stroke="#a855f7" stroke-width="1" opacity="0.3"/>
    <circle r="38" fill="none" stroke="#a855f7" stroke-width="1" opacity="0.15"/>
    <!-- Eye shape -->
    <path d="M-28,0 Q0,-24 28,0 Q0,24 -28,0 Z" fill="none" stroke="#a855f7" stroke-width="2"/>
    <circle r="10" fill="none" stroke="#a855f7" stroke-width="2"/>
    <circle r="4" fill="#a855f7" opacity="0.8"/>
    <!-- Crown points above -->
    <path d="M-16,-28 L-12,-20 L-4,-28 L0,-18 L4,-28 L12,-20 L16,-28" fill="none" stroke="#6366f1" stroke-width="1.5" opacity="0.6"/>
    <!-- Radiance -->
    <line x1="0" y1="-34" x2="0" y2="-42" stroke="#a855f7" stroke-width="1" opacity="0.4"/>
    <line x1="20" y1="-28" x2="26" y2="-34" stroke="#a855f7" stroke-width="1" opacity="0.3"/>
    <line x1="-20" y1="-28" x2="-26" y2="-34" stroke="#a855f7" stroke-width="1" opacity="0.3"/>
  </g>

  <!-- Name -->
  <text x="140" y="185" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="26" font-weight="700" fill="#ffffff" letter-spacing="4">ARCHON</text>

  <!-- Role -->
  <text x="140" y="210" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="13" fill="#a855f7" opacity="0.9" letter-spacing="1">AUTONOMOUS STRATEGIST</text>

  <!-- Divider -->
  <line x1="40" y1="228" x2="240" y2="228" stroke="#a855f7" stroke-width="0.5" opacity="0.3"/>

  <!-- Stats -->
  <g font-family="'Segoe UI',system-ui,sans-serif" font-size="12">
    <text x="40" y="256" fill="#8892b0">Persistence</text>
    <text x="240" y="256" text-anchor="end" fill="#a855f7">Multi-session</text>

    <text x="40" y="282" fill="#8892b0">Scope</text>
    <text x="240" y="282" text-anchor="end" fill="#ccd6f6">Platform-wide</text>

    <text x="40" y="308" fill="#8892b0">Decisions</text>
    <text x="240" y="308" text-anchor="end" fill="#ccd6f6">Autonomous</text>

    <text x="40" y="334" fill="#8892b0">Supervision</text>
    <text x="240" y="334" text-anchor="end" fill="#a855f7">None required</text>
  </g>

  <!-- Bottom description -->
  <text x="140" y="372" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#8892b0" opacity="0.7">
    <tspan x="140" dy="0">Campaigns that survive across sessions</tspan>
    <tspan x="140" dy="14">with persistent state and quality judgment.</tspan>
  </text>
</svg>
